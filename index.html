<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tägliche Quiz Runde</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#141019;color:#f2ebff;font-family:system-ui,sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .top{background:#251a30;border:2px solid #4e3a63;border-radius:14px;padding:12px;text-align:center}
    .title{font-size:34px;font-weight:900;color:#e3c47f}
    .mode{display:flex;justify-content:center;gap:8px;margin:12px 0}
    .mode .btn.active{border-color:#e3c47f;box-shadow:0 0 0 1px #000 inset}
    .btn{padding:10px 14px;border-radius:10px;border:2px solid #5c4474;background:#332447;color:#fff;font-weight:700;cursor:pointer}
    .btn.green{background:#2d8a4d;border-color:#4ac26d}
    .btn.cta{font-size:18px;padding:13px 22px;min-width:170px}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .card{background:#23192c;border:2px solid #3b2b4a;border-radius:14px;padding:14px;margin-top:12px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
    .grid.trio{grid-template-columns:repeat(2,minmax(140px,1fr));max-width:420px;margin:0 auto}
    .grid.trio .char.third{grid-column:1 / span 2;justify-self:center;width:48%}
    .char{border:2px solid #56406d;border-radius:10px;padding:10px;text-align:center;cursor:pointer;background:#1a1321}
    .char.active{border-color:#e3c47f}
    .char.taken{opacity:.7;text-decoration:line-through;text-decoration-color:#ff6b7a}
    input{width:100%;padding:9px;border-radius:8px;border:1px solid #4f3a60;background:#18111f;color:#fff}
    .pinPad{margin:10px auto 0;display:grid;grid-template-columns:repeat(3,minmax(64px,1fr));gap:8px;max-width:280px}
    .pinWrap{display:flex;flex-direction:column;align-items:center}
    .pinBtn{padding:10px 0;border-radius:10px;border:2px solid #5c4474;background:#2b1f39;color:#fff;font-weight:800;cursor:pointer}
    .pinBtn.wide{grid-column:span 2}
    .sectionTitle{display:flex;align-items:center;justify-content:space-between;margin-top:14px;margin-bottom:8px}
    .sectionTitle h3{margin:0}
    .pill{font-size:12px;padding:4px 8px;border-radius:999px;background:#352547;border:1px solid #644a80;color:#e8d9ff}
    .raceInfo{display:grid;grid-template-columns:repeat(3,minmax(120px,1fr));gap:8px;margin:8px 0 12px}
    .stat{background:#1b1223;border:1px solid #4e3a63;border-radius:10px;padding:8px}
    .stat b{display:block;font-size:18px;color:#f6d88a}
    .leader{list-style:none;margin:0;padding:0}
    .leader li{display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed #4c3961;padding:8px 0}
    .leader li:last-child{border-bottom:none}
    #quiz{display:none}
    .timer{height:10px;background:#261d31;border:1px solid #584170;border-radius:999px;overflow:hidden;margin:8px 0}
    .timer>div{height:100%;background:linear-gradient(90deg,#4fd475,#d2f27a);width:100%}
    .opt{display:block;width:100%;text-align:left;margin:8px 0}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .nameWithStatus{display:inline-flex;align-items:center;gap:8px}
    .doneCheck{color:#54d776;font-size:18px;font-weight:900;line-height:1}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div class="title">🧠 Tägliche Quiz Runde</div></div>

    <section id="home" class="card">
      <div class="mode">
        <button id="mLogin" class="btn" onclick="setMode('login')">Login</button>
        <button id="mReg" class="btn" onclick="setMode('reg')">Register</button>
      </div>

      <div id="regBox">
        <h3>Charakter wählen</h3>
        <div id="regChars" class="grid"></div>
        <div class="pinWrap">
          <label style="margin-top:10px;display:block">4-stellige PIN</label>
          <input id="regPw" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" style="max-width:280px;text-align:center" />
          <div class="pinPad" data-target="regPw"></div>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:center"><button class="btn green cta" onclick="registerAndGo()">Let’s go</button></div>
      </div>

      <div id="loginBox" style="display:none">
        <h3>Eingetragener Charakter</h3>
        <div id="loginChars" class="grid"></div>
        <div class="pinWrap">
          <label style="margin-top:10px;display:block">4-stellige PIN</label>
          <input id="loginPw" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" style="max-width:280px;text-align:center" />
          <div class="pinPad" data-target="loginPw"></div>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:center"><button class="btn green cta" onclick="loginAndGo()">Let’s go</button></div>
      </div>

      <div class="sectionTitle"><h3>🏁 Monatsrennen</h3><span class="pill" id="monthPill">Monat</span></div>
      <div class="raceInfo">
        <div class="stat"><small>Heute</small><b id="todayDate">-</b></div>
        <div class="stat"><small>Monatsende</small><b id="monthEndDate">-</b></div>
        <div class="stat"><small>Verbleibend</small><b id="daysLeft">-</b></div>
      </div>
      <p id="monthInfo" style="margin:6px 0 10px;opacity:.9"></p>
      <ul id="monthLeaderboard" class="leader"></ul>

      <div class="sectionTitle"><h3>🏆 Gesamt-Leaderboard</h3><span class="pill">All Time</span></div>
      <ul id="leaderboard" class="leader"></ul>
    </section>

    <section id="quiz" class="card">
      <div class="row">
        <h3 id="qtitle">Frage 1/3</h3>
        <div id="timerText">20s</div>
      </div>
      <div class="timer"><div id="tbar"></div></div>
      <p id="qprompt"></p>
      <div id="qopts"></div>
      <p id="qresult"></p>
      <div class="row" style="margin-top:12px">
        <span id="progressLabel"></span>
        <button id="nextBtn" class="btn" disabled onclick="nextStep()">Weiter</button>
        <button id="homeBtn" class="btn" style="display:none" disabled onclick="backHome()">Zur Startseite</button>
      </div>
    </section>
  </div>
<script>
let mode='login', selectedReg=null, selectedLogin=null, session=null;
let timerInt=null, left=20, answered=false, currentIndex=0, totalQuestions=3;

function ensurePinOnly(el){
  el.value = String(el.value || '').replace(/\D/g, '').slice(0, 4);
}

function bindPinInput(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', ()=>ensurePinOnly(el));
  el.addEventListener('focus', ()=>ensurePinOnly(el));
}

function setupPinPads(){
  document.querySelectorAll('.pinPad').forEach((pad)=>{
    const targetId = pad.getAttribute('data-target');
    const target = document.getElementById(targetId);
    if (!target) return;
    const mk = (txt, cls, onClick) => {
      const b = document.createElement('button');
      b.type='button';
      b.className = `pinBtn${cls?` ${cls}`:''}`;
      b.textContent = txt;
      b.onclick = onClick;
      return b;
    };
    pad.innerHTML = '';
    for (let n=1; n<=9; n++) {
      pad.appendChild(mk(String(n), '', ()=>{ ensurePinOnly(target); if (target.value.length < 4) target.value += String(n); }));
    }
    pad.appendChild(mk('⌫', '', ()=>{ ensurePinOnly(target); target.value = target.value.slice(0,-1); }));
    pad.appendChild(mk('0', '', ()=>{ ensurePinOnly(target); if (target.value.length < 4) target.value += '0'; }));
    pad.appendChild(mk('Clear', '', ()=>{ target.value=''; }));
  });
}

function setMode(m){
  mode=m;
  document.getElementById('regBox').style.display=m==='reg'?'block':'none';
  document.getElementById('loginBox').style.display=m==='login'?'block':'none';
  document.getElementById('mReg').classList.toggle('active', m==='reg');
  document.getElementById('mLogin').classList.toggle('active', m==='login');
}

function applyTrioLayout(container){
  container.classList.remove('trio');
  [...container.children].forEach(el=>el.classList.remove('third'));
  if (container.children.length === 3) {
    container.classList.add('trio');
    container.children[2].classList.add('third');
  }
}

async function boot(){
  const r=await fetch('/api/bootstrap'); const d=await r.json();
  const reg=document.getElementById('regChars'); reg.innerHTML='';
  const login=document.getElementById('loginChars'); login.innerHTML='';

  d.characters.forEach(c=>{
    const taken=d.taken.includes(c);

    const rc=document.createElement('div'); rc.className='char'+(taken?' taken':''); rc.textContent=c;
    if(!taken){
      rc.onclick=()=>{selectedReg=c; [...reg.children].forEach(x=>x.classList.remove('active')); rc.classList.add('active');};
    }
    reg.appendChild(rc);

    if(taken){
      const lc=document.createElement('div'); lc.className='char'; lc.textContent=c;
      lc.onclick=()=>{selectedLogin=c; [...login.children].forEach(x=>x.classList.remove('active')); lc.classList.add('active');};
      login.appendChild(lc);
    }
  });

  applyTrioLayout(reg);
  applyTrioLayout(login);

  const lb=document.getElementById('leaderboard');
  lb.innerHTML = d.leaderboard.length ? d.leaderboard.map(x=>{
    const doneToday = Boolean(d.completionByCharacter && d.completionByCharacter[x.character]);
    const name = doneToday
      ? `<span class="nameWithStatus"><span>${x.character}</span><span class="doneCheck" title="Heute 3/3 beantwortet">✅</span></span>`
      : `<span>${x.character}</span>`;
    return `<li>${name}<b>${x.points} pts</b></li>`;
  }).join('') : '<li>No points yet.</li>';

  const mlb = document.getElementById('monthLeaderboard');
  const monthRows = Array.isArray(d.monthlyLeaderboard) ? d.monthlyLeaderboard : [];
  mlb.innerHTML = monthRows.length
    ? monthRows.map((x,i)=>`<li><span>#${i+1} ${x.character}</span><b>${x.points} pts</b></li>`).join('')
    : '<li>No points yet.</li>';

  const mi = document.getElementById('monthInfo');
  const leader = monthRows[0];
  const days = Number(d.month?.daysRemaining ?? 0);
  const end = String(d.month?.monthEndsAt || '');

  document.getElementById('todayDate').textContent = String(d.month?.today || '-');
  document.getElementById('monthEndDate').textContent = end || '-';
  document.getElementById('daysLeft').textContent = `${days} Tage`;
  document.getElementById('monthPill').textContent = String(d.monthKey || 'Monat');

  if (days === 0) {
    mi.textContent = leader ? `Finale: ${leader.character} führt mit ${leader.points} Punkten.` : `Heute ist Monatsende (${end}).`; 
  } else {
    mi.textContent = leader
      ? `Noch ${days} Tage bis Monatsende. Aktuell führt ${leader.character} mit ${leader.points} Punkten.`
      : `Noch ${days} Tage bis Monatsende (${end}).`;
  }
}

async function registerAndGo(){
  const password=document.getElementById('regPw').value.trim();
  if(!selectedReg) return alert('Bitte Charakter wählen');
  if(!/^\d{4}$/.test(password)) return alert('Bitte eine 4-stellige PIN eingeben');
  const r=await fetch('/api/register',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({character:selectedReg,password})});
  const d=await r.json(); if(!r.ok) return alert(d.error||'Fehler');
  session={character:selectedReg,password};
  await startQuiz();
}

async function loginAndGo(){
  const password=document.getElementById('loginPw').value.trim();
  if(!selectedLogin) return alert('Bitte registrierten Charakter wählen');
  if(!/^\d{4}$/.test(password)) return alert('Bitte deine 4-stellige PIN eingeben');
  const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({character:selectedLogin,password})});
  const d=await r.json(); if(!r.ok) return alert(d.error||'Fehler');
  session={character:selectedLogin,password};
  await startQuiz();
}

async function startQuiz(){
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='block';
  await loadQuestion(0);
}

async function loadQuestion(index){
  clearInterval(timerInt);
  answered=false;
  left=20;
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('homeBtn').disabled=true;
  document.getElementById('qresult').textContent='';

  const r=await fetch('/api/question-today?character='+encodeURIComponent(session.character)+'&questionIndex='+index);
  const d=await r.json(); if(!r.ok) return alert(d.error||'Fragefehler');

  currentIndex=Number(d.questionIndex||0);
  totalQuestions=Number(d.totalQuestions||3);

  document.getElementById('qtitle').textContent=`Frage ${currentIndex+1}/${totalQuestions}`;
  document.getElementById('qprompt').textContent=d.question.prompt;
  document.getElementById('progressLabel').textContent=`Beantwortet: ${d.progress.answeredCount}/${totalQuestions}`;

  const qopts=document.getElementById('qopts'); qopts.innerHTML='';
  d.question.options.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='btn opt'; b.textContent=o;
    b.onclick=()=>submitAnswer(i,false); qopts.appendChild(b);
  });

  const finished = Boolean(d.finished);
  document.getElementById('nextBtn').style.display = (!finished && currentIndex < totalQuestions-1) ? 'inline-block' : 'none';
  document.getElementById('homeBtn').style.display = (finished || currentIndex === totalQuestions-1) ? 'inline-block' : 'none';

  if (finished) {
    lockOptions();
    document.getElementById('qresult').textContent='Heute bereits alle 3 Fragen beantwortet. Morgen ab 08:30 gibt es neue Fragen.';
    document.getElementById('homeBtn').disabled=false;
    return;
  }
  runTimer();
}

function runTimer(){
  clearInterval(timerInt);
  const bar=document.getElementById('tbar');
  document.getElementById('timerText').textContent='20s';
  bar.style.width='100%';
  timerInt=setInterval(()=>{
    left--; document.getElementById('timerText').textContent=left+'s';
    bar.style.width=Math.max(0,(left/20)*100)+'%';
    if(left<=0){ clearInterval(timerInt); if(!answered){ submitAnswer(-1,true); }}
  },1000);
}

function lockOptions(correctIndex = null, chosenIndex = null){
  [...document.querySelectorAll('#qopts .opt')].forEach((b,i)=>{
    b.disabled = true;
    if(correctIndex !== null && i===correctIndex){ b.classList.add('green'); }
    else if(chosenIndex !== null && i===chosenIndex){ b.style.background='#6a1f2e'; b.style.borderColor='#d94f64'; }
  });
}

async function submitAnswer(choiceIndex, timedOut){
  if(answered) return;
  answered=true;
  clearInterval(timerInt);

  const r=await fetch('/api/answer',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({character:session.character,password:session.password,questionIndex:currentIndex,choiceIndex,timedOut})});
  const d=await r.json();
  if(!r.ok){ document.getElementById('qresult').textContent=d.error||'Fehler'; return; }

  lockOptions(Number(d.correctIndex), timedOut ? null : choiceIndex);
  if (timedOut) document.getElementById('qresult').textContent='Zeit abgelaufen – kein Punkt. Richtige Antwort ist markiert.';
  else if (d.isCorrect) document.getElementById('qresult').textContent=`Richtig! +1 Punkt (Gesamt: ${d.points})`;
  else document.getElementById('qresult').textContent='Falsch – kein Punkt. Richtige Antwort ist markiert.';

  document.getElementById('progressLabel').textContent=`Beantwortet: ${d.answeredCount}/${totalQuestions}`;

  const isLastQuestion = currentIndex >= totalQuestions - 1;
  if (!isLastQuestion && !d.roundFinished) document.getElementById('nextBtn').disabled=false;
  else document.getElementById('homeBtn').disabled=false;

  await boot();
}

function nextStep(){ if(!document.getElementById('nextBtn').disabled) loadQuestion(currentIndex + 1); }
function backHome(){ if(!document.getElementById('homeBtn').disabled){ clearInterval(timerInt); document.getElementById('quiz').style.display='none'; document.getElementById('home').style.display='block'; boot(); } }

bindPinInput('regPw');
bindPinInput('loginPw');
setupPinPads();
boot(); setMode('login');
</script>
</body>
</html>
